<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arxivist</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .app-header {
            flex-shrink: 0;
            background: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            padding: 0 1.5rem;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .app-header h1 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
        }

        .app-header .subtitle {
            font-size: 0.82rem;
            color: #555;
        }

        /* Main area */
        .app-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left panel */
        .left-panel {
            width: 300px;
            flex-shrink: 0;
            background: #1a1d27;
            border-right: 1px solid #2a2d3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-panel-header {
            flex-shrink: 0;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #2a2d3a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .left-panel-header h2 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .file-count-badge {
            background: #5b6ef5;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.1rem 0.45rem;
            border-radius: 10px;
            margin-left: 0.4rem;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.45rem 0.6rem;
            border-radius: 6px;
            font-size: 0.82rem;
            transition: background 0.15s;
        }

        .file-item:hover { background: #22253a; }

        .file-name {
            color: #8b9cf7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .file-size {
            color: #555;
            font-size: 0.78rem;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .file-list-empty {
            color: #555;
            font-size: 0.82rem;
            padding: 0.5rem 0.25rem;
            font-style: italic;
        }

        /* Right panel */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Message bubbles */
        .msg-user {
            align-self: flex-end;
            background: #5b6ef5;
            color: #fff;
            border-radius: 12px 12px 2px 12px;
            padding: 0.65rem 1rem;
            max-width: 75%;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-assistant {
            align-self: flex-start;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 2px 12px 12px 12px;
            padding: 0.75rem 1rem;
            max-width: 85%;
            font-size: 0.875rem;
            line-height: 1.65;
            color: #ccc;
            word-break: break-word;
        }

        /* Markdown inside assistant messages */
        .msg-assistant h1, .msg-assistant h2, .msg-assistant h3 {
            color: #fff;
            margin: 0.8rem 0 0.4rem;
        }
        .msg-assistant h3:first-child { margin-top: 0; }
        .msg-assistant strong { color: #ddd; }
        .msg-assistant p { margin-bottom: 0.4rem; }
        .msg-assistant hr {
            border: none;
            border-top: 1px solid #2a2d3a;
            margin: 0.75rem 0;
        }
        .msg-assistant code {
            background: #12141c;
            border-radius: 4px;
            padding: 0.1em 0.4em;
            font-size: 0.85em;
        }
        .msg-assistant pre {
            background: #12141c;
            border-radius: 6px;
            padding: 0.75rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .msg-assistant pre code {
            background: none;
            padding: 0;
        }
        .msg-assistant ul, .msg-assistant ol {
            padding-left: 1.4rem;
            margin-bottom: 0.4rem;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 2px 12px 12px 12px;
            padding: 0.65rem 1rem;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 0.9s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Input area */
        .input-area {
            flex-shrink: 0;
            padding: 1rem 1.25rem;
            border-top: 1px solid #2a2d3a;
            background: #1a1d27;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .textarea-wrapper {
            position: relative;
            flex: 1;
        }

        .resize-handle {
            position: absolute;
            top: 0;
            right: 0;
            width: 28px;
            height: 18px;
            cursor: n-resize;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            z-index: 10;
            border-radius: 0 8px 0 0;
            padding-top: 4px;
        }

        .resize-handle span {
            display: block;
            width: 14px;
            height: 2px;
            background: #444;
            border-radius: 2px;
            transition: background 0.15s;
        }

        .resize-handle:hover span { background: #888; }

        .chat-textarea {
            background: #12141c;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            padding: 0.65rem 1rem;
            resize: none;
            min-height: 72px;
            max-height: 300px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        .chat-textarea:focus { border-color: #5b6ef5; }

        .send-btn {
            background: #5b6ef5;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1.1rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: #4a5ce0; }
        .send-btn:disabled { background: #333; cursor: not-allowed; }

        .status-line {
            margin-top: 0.4rem;
            font-size: 0.78rem;
            color: #666;
            min-height: 1em;
        }

        .status-line .query-text {
            font-family: monospace;
            color: #8b9cf7;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <h1>Arxivist</h1>
            <span class="subtitle">AI research assistant — search, download, and summarize papers</span>
        </header>

        <!-- Main -->
        <div class="app-main">
            <!-- Left panel: file list -->
            <aside class="left-panel">
                <div class="left-panel-header">
                    <h2>Downloaded Papers</h2>
                    <span class="file-count-badge" id="fileCountBadge">0</span>
                </div>
                <div class="file-list" id="fileList">
                    <div class="file-list-empty">No papers yet</div>
                </div>
            </aside>

            <!-- Right panel: chat -->
            <div class="right-panel">
                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <div class="input-row">
                        <div class="textarea-wrapper">
                            <div class="resize-handle" id="resizeHandle">
                                <span></span><span></span>
                            </div>
                            <textarea
                                id="chatInput"
                                class="chat-textarea"
                                placeholder="Ask anything — find papers, summarize results, connect a database..."
                                rows="1"
                            ></textarea>
                        </div>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                    </div>
                    <div class="status-line" id="statusLine"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE = "{{ base }}";
        const conversationHistory = [];

        const messagesArea = document.getElementById('messagesArea');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusLine = document.getElementById('statusLine');
        const fileList = document.getElementById('fileList');
        const fileCountBadge = document.getElementById('fileCountBadge');

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            if (role === 'user') {
                div.className = 'msg-user';
                div.textContent = content;
            } else {
                div.className = 'msg-assistant';
                div.innerHTML = marked.parse(content);
            }
            messagesArea.appendChild(div);
            scrollToBottom();
            return div;
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            messagesArea.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || sendBtn.disabled) return;

            // Show user bubble
            appendMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });

            // Clear and reset textarea
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // Disable input while waiting
            sendBtn.disabled = true;
            chatInput.disabled = true;
            showTypingIndicator();
            statusLine.textContent = '';

            try {
                const resp = await fetch(BASE + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        history: conversationHistory.slice(0, -1) // exclude the one we just added
                    }),
                });

                const data = await resp.json();
                removeTypingIndicator();

                if (data.error) {
                    appendMessage('assistant', `**Error:** ${data.error}`);
                } else {
                    const reply = data.reply || 'No response received.';
                    appendMessage('assistant', reply);
                    conversationHistory.push({ role: 'assistant', content: reply });

                    // Update status line
                    const parts = [];
                    if (data.search_query) {
                        parts.push(`arXiv query: <span class="query-text">${escapeHtml(data.search_query)}</span>`);
                    }
                    if (data.elapsed_seconds != null) {
                        parts.push(`${data.elapsed_seconds}s`);
                    }
                    statusLine.innerHTML = parts.join(' &nbsp;·&nbsp; ');

                    refreshFiles();
                }
            } catch (err) {
                removeTypingIndicator();
                appendMessage('assistant', `**Network error:** ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        }

        async function refreshFiles() {
            try {
                const resp = await fetch(BASE + '/files');
                const data = await resp.json();
                const files = data.files || [];

                fileCountBadge.textContent = files.length;

                if (files.length === 0) {
                    fileList.innerHTML = '<div class="file-list-empty">No papers yet</div>';
                } else {
                    fileList.innerHTML = files.map(f => `
                        <div class="file-item">
                            <span class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
                            <span class="file-size">${f.size_kb} KB</span>
                        </div>
                    `).join('');
                }
            } catch (err) {
                // Silently ignore refresh errors
            }
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Textarea: Enter sends, Shift+Enter newline, auto-resize
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 300) + 'px';
        });

        // Custom top-right resize handle — dragging up expands, down shrinks
        const resizeHandle = document.getElementById('resizeHandle');
        let isResizing = false;
        let resizeStartY = 0;
        let resizeStartHeight = 0;

        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizeStartY = e.clientY;
            resizeStartHeight = chatInput.offsetHeight;
            document.body.style.cursor = 'n-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const deltaY = resizeStartY - e.clientY; // up = positive
            const newHeight = Math.min(Math.max(resizeStartHeight + deltaY, 72), 300);
            chatInput.style.height = newHeight + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (!isResizing) return;
            isResizing = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // Initial file load
        refreshFiles();
    </script>
</body>
</html>
